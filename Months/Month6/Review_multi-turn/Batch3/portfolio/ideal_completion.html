<!-- ideal_completion.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Meta Tags for responsiveness and character encoding -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Portfolio</title>
    <!-- GSAP Animation Libraries -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"
      defer
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"
      defer
    ></script>
    <!-- Inline CSS Styles -->
    <style>
      /* Reset and Basic Styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* Body Styles with Transition for Theme Toggle */
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        transition: background-color 0.5s, color 0.5s;
        overflow-x: hidden;
      }

      /* Day and Night Theme Colors */
      body.day-mode {
        background-color: #f0f0f0;
        color: #333;
      }

      body.night-mode {
        background-color: #1e1e1e;
        color: #ddd;
      }

      /* Theme Toggle Switch Styles */
      .theme-toggle {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1000;
        width: 50px;
        height: 50px;
        cursor: pointer;
        overflow: hidden;
      }

      .theme-toggle .icon {
        width: 100%;
        height: 100%;
        transition: opacity 0.5s, transform 0.5s;
        position: absolute;
        top: 0;
        left: 0;
      }

      .theme-toggle .icon svg {
        width: 100%;
        height: 100%;
      }

      .theme-toggle .icon.sun {
        opacity: 1;
        transform: scale(1);
      }

      .theme-toggle .icon.moon {
        opacity: 0;
        transform: scale(0.5);
      }

      body.night-mode .theme-toggle .icon.sun {
        opacity: 0;
        transform: scale(0.5);
      }

      body.night-mode .theme-toggle .icon.moon {
        opacity: 1;
        transform: scale(1);
      }

      /* Navigation Menu Styles */
      header {
        position: fixed;
        width: 100%;
        background: rgba(255, 255, 255, 0.95);
        transition: padding 0.3s, background 0.3s;
        padding: 20px 0;
        z-index: 999;
      }

      body.night-mode header {
        background: rgba(30, 30, 30, 0.95);
      }

      header.shrink {
        padding: 10px 0;
        background: rgba(255, 255, 255, 0.9);
      }

      body.night-mode header.shrink {
        background: rgba(30, 30, 30, 0.9);
      }

      nav {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .nav-links {
        list-style: none;
        display: flex;
      }

      .nav-links li {
        margin: 0 15px;
        position: relative;
      }

      .nav-links a {
        text-decoration: none;
        color: inherit;
        font-size: 18px;
        font-weight: 600;
        transition: color 0.3s;
      }

      .nav-links a:hover {
        color: #ffcf33;
      }

      /* Underline Hover Effect */
      .nav-links a::after {
        content: "";
        position: absolute;
        width: 0%;
        height: 2px;
        background-color: #ffcf33;
        bottom: -5px;
        left: 0;
        transition: width 0.3s;
      }

      .nav-links a:hover::after {
        width: 100%;
      }

      /* Parallax Background */
      .parallax-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("background-image.jpg"); /* Replace with your background image URL */
        background-attachment: fixed;
        background-size: cover;
        background-position: center;
        z-index: -1;
      }

      /* Welcome Section Styles */
      #welcome-section {
        display: flex;
        height: 100vh;
        justify-content: center;
        align-items: center;
        text-align: center;
      }

      .title {
        font-size: 64px;
        font-weight: 600;
        color: #ffcf33;
        animation: slideDown 1s forwards;
        opacity: 0;
      }

      /* Slide Down Animation */
      @keyframes slideDown {
        to {
          opacity: 1;
          transform: translateY(0);
        }
        from {
          opacity: 0;
          transform: translateY(-50px);
        }
      }

      /* Profile Section */
      #profile-section {
        padding: 100px 20px;
        text-align: center;
        background-color: rgba(255, 255, 255, 0.8);
      }

      body.night-mode #profile-section {
        background-color: rgba(30, 30, 30, 0.8);
      }

      #profile-section h2 {
        font-size: 36px;
        margin-bottom: 20px;
      }

      #profile-section p {
        font-size: 18px;
        max-width: 800px;
        margin: 0 auto;
        line-height: 1.6;
      }

      /* Work Section */
      #work-section {
        padding: 100px 20px;
        text-align: center;
        background-color: rgba(255, 255, 255, 0.9);
      }

      body.night-mode #work-section {
        background-color: rgba(30, 30, 30, 0.9);
      }

      #work-section h2 {
        font-size: 36px;
        margin-bottom: 20px;
      }

      /* Project Sorter Buttons */
      .project-sorter {
        margin-bottom: 40px;
      }

      .project-sorter button {
        margin: 0 10px;
        padding: 10px 20px;
        cursor: pointer;
        background-color: #ffcf33;
        border: none;
        border-radius: 5px;
        font-weight: 600;
        color: #333;
        transition: background-color 0.3s, transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .project-sorter button:hover {
        background-color: #e0b828;
        transform: translateY(-5px);
        box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
      }

      /* Projects Grid */
      .projects-grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
      }

      /* Project Card Styles */
      .project-card {
        width: 300px;
        height: 400px;
        perspective: 1000px;
        margin: 20px;
      }

      .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.8s;
        transform-style: preserve-3d;
      }

      .project-card:hover .card-inner {
        transform: rotateY(180deg);
      }

      .card-front,
      .card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      }

      .card-front img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .card-back {
        background-color: #fff;
        color: #333;
        transform: rotateY(180deg);
        padding: 20px;
        box-sizing: border-box;
      }

      body.night-mode .card-back {
        background-color: #2e2e2e;
        color: #ddd;
      }

      .card-back h3 {
        margin-bottom: 10px;
      }

      .card-back p {
        font-size: 16px;
      }

      .info-btn {
        margin-top: 20px;
        padding: 10px 20px;
        cursor: pointer;
        background-color: #ffcf33;
        border: none;
        border-radius: 5px;
        font-weight: 600;
        color: #333;
        transition: background-color 0.3s, transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .info-btn:hover {
        background-color: #e0b828;
        transform: translateY(-5px);
        box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
      }

      /* Contact Section */
      #contact-section {
        padding: 100px 20px;
        text-align: center;
        background-color: rgba(255, 255, 255, 0.95);
      }

      body.night-mode #contact-section {
        background-color: rgba(30, 30, 30, 0.95);
      }

      #contact-section h2 {
        font-size: 36px;
        margin-bottom: 20px;
      }

      #contact-form {
        max-width: 600px;
        margin: 0 auto;
      }

      .form-field {
        margin-bottom: 30px;
        position: relative;
      }

      .form-field label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
      }

      .input-wrapper {
        position: relative;
      }

      .form-field input,
      .form-field textarea {
        width: 100%;
        padding: 15px;
        box-sizing: border-box;
        border: 2px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
        transition: border-color 0.3s;
      }

      body.night-mode .form-field input,
      body.night-mode .form-field textarea {
        background-color: #2e2e2e;
        color: #ddd;
        border-color: #555;
      }

      .form-field input:focus,
      .form-field textarea:focus {
        border-color: #ffcf33;
        outline: none;
      }

      .validity {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
      }

      .validity.valid {
        color: green;
      }

      .validity.invalid {
        color: red;
      }

      /* Submit Button Styles */
      #contact-form button {
        padding: 15px 30px;
        cursor: pointer;
        background-color: #ffcf33;
        border: none;
        border-radius: 5px;
        font-weight: 600;
        font-size: 18px;
        color: #333;
        transition: background-color 0.3s, transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      #contact-form button:hover {
        background-color: #e0b828;
        transform: translateY(-5px);
        box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
      }

      /* Modal Styles */
      .modal {
        display: none;
        position: fixed;
        z-index: 1001;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.8);
      }

      .modal-content {
        background-color: #fefefe;
        margin: 5% auto;
        padding: 40px;
        width: 80%;
        max-width: 800px;
        position: relative;
        border-radius: 10px;
      }

      body.night-mode .modal-content {
        background-color: #2e2e2e;
        color: #ddd;
      }

      .close-btn {
        color: #aaa;
        position: absolute;
        right: 20px;
        top: 10px;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
      }

      .close-btn:hover,
      .close-btn:focus {
        color: #000;
        text-decoration: none;
        cursor: pointer;
      }

      /* Media Queries for Responsiveness */
      @media (max-width: 768px) {
        .nav-links li {
          margin: 0 10px;
        }

        .title {
          font-size: 48px;
        }

        .project-card {
          width: 100%;
          margin: 10px 0;
        }

        header {
          padding: 10px 0;
        }
      }
    </style>
  </head>
  <body class="day-mode">
    <!-- Day/Night Mode Toggle Switch -->
    <div class="theme-toggle">
      <div class="icon sun">
        <!-- Sun Icon SVG -->
        <svg viewBox="0 0 64 64" fill="#ffcf33">
          <circle cx="32" cy="32" r="14"></circle>
          <g>
            <line
              x1="32"
              y1="2"
              x2="32"
              y2="12"
              stroke="#ffcf33"
              stroke-width="4"
            ></line>
            <line
              x1="32"
              y1="52"
              x2="32"
              y2="62"
              stroke="#ffcf33"
              stroke-width="4"
            ></line>
            <line
              x1="2"
              y1="32"
              x2="12"
              y2="32"
              stroke="#ffcf33"
              stroke-width="4"
            ></line>
            <line
              x1="52"
              y1="32"
              x2="62"
              y2="32"
              stroke="#ffcf33"
              stroke-width="4"
            ></line>
            <line
              x1="11"
              y1="11"

              y2="18"
              stroke="#ffcf33"
              stroke-width="4"
            ></line>
            <line
              x1="46"
              y1="46"
              x2="53"
              y2="53"
              stroke="#ffcf33"
              stroke-width="4"
            ></line>
            <line
              x1="11"
              y1="53"
              x2="18"
              y2="46"
              stroke="#ffcf33"
              stroke-width="4"
            ></line>
            <line
              x1="46"
              y1="18"
              x2="53"
              y2="11"
              stroke="#ffcf33"
              stroke-width="4"
            ></line>
          </g>
        </svg>
      </div>
      <div class="icon moon">
        <!-- Moon Icon SVG -->
        <svg viewBox="0 0 64 64" fill="#4b6cb7">
          <path
            d="M32,2c-7.8,0-15.1,3.1-20.5,8.5S2,24.2,2,32s3.1,15.1,8.5,20.5S24.2,61,32,61c8.4,0,16-3.9,21-10.3 c-6.8,1.9-14.6,0.3-20-5c-5.4-5.4-6.9-13.2-5-20C35.9,18,32.9,2,32,2z"
          ></path>
        </svg>
      </div>
    </div>

    <!-- Navigation Menu -->
    <header id="header">
      <nav>
        <ul class="nav-links">
          <li><a href="#welcome-section">Welcome</a></li>
          <li><a href="#profile-section">Profile</a></li>
          <li><a href="#work-section">Work</a></li>
          <li><a href="#contact-section">Get In Touch</a></li>
        </ul>
      </nav>
    </header>

    <!-- Moving Background Effect -->
    <div class="parallax-bg"></div>

    <!-- Welcome Section -->
    <section id="welcome-section">
      <h1 class="title">Your Name</h1>
    </section>

    <!-- Profile Section -->
    <section id="profile-section">
      <h2>About Me</h2>
      <p>Your profile information goes here.</p>
    </section>

    <!-- Work Section -->
    <section id="work-section">
      <h2>My Projects</h2>
      <!-- Project Sorter -->
      <div class="project-sorter">
        <button data-filter="all">All</button>
        <button data-filter="software">Software Development</button>
        <button data-filter="graphics">Graphics</button>
      </div>
      <!-- Projects Grid -->
      <div class="projects-grid">
        <!-- Project Card Example -->
        <div class="project-card" data-category="software">
          <div class="card-inner">
            <div class="card-front">
              <img src="project1-thumbnail.jpg" alt="Project 1" />
              <!-- Replace with your project image URL -->
            </div>
            <div class="card-back">
              <h3>Project Title</h3>
              <p>Short project overview.</p>
              <button class="info-btn">More Info</button>
            </div>
          </div>
        </div>
        <!-- Add more project cards as needed -->
      </div>
    </section>

    <!-- Contact Section -->
    <section id="contact-section">
      <h2>Contact Me</h2>
      <form id="contact-form">
        <!-- Name Field -->
        <div class="form-field">
          <label for="name">Name:</label>
          <div class="input-wrapper">
            <input type="text" id="name" name="name" required />
            <span class="validity"></span>
          </div>
        </div>
        <!-- Email Field -->
        <div class="form-field">
          <label for="email">Email:</label>
          <div class="input-wrapper">
            <input type="email" id="email" name="email" required />
            <span class="validity"></span>
          </div>
        </div>
        <!-- Message Field -->
        <div class="form-field">
          <label for="message">Message:</label>
          <div class="input-wrapper">
            <textarea id="message" name="message" required></textarea>
            <span class="validity"></span>
          </div>
        </div>
        <!-- Submit Button -->
        <button type="submit">Send Message</button>
      </form>
    </section>

    <!-- Project Info Pop-up Modal -->
    <div id="project-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <!-- Project Details will be loaded here dynamically -->
        <div id="modal-details"></div>
      </div>
    </div>

    <!-- Inline JavaScript -->
    <script>
      // Wait for the DOM to load
      document.addEventListener("DOMContentLoaded", () => {
        // GSAP Animations on Scroll
        gsap.registerPlugin(ScrollTrigger);

        // Animate elements as they enter the viewport
        gsap.from("#profile-section h2", {
          scrollTrigger: {
            trigger: "#profile-section h2",
            start: "top 80%",
          },
          y: 50,
          opacity: 0,
          duration: 1,
        });

        gsap.from("#profile-section p", {
          scrollTrigger: {
            trigger: "#profile-section p",
            start: "top 80%",
          },
          y: 50,
          opacity: 0,
          duration: 1,
          delay: 0.2,
        });

        gsap.from("#work-section h2", {
          scrollTrigger: {
            trigger: "#work-section h2",
            start: "top 80%",
          },
          y: 50,
          opacity: 0,
          duration: 1,
        });

        gsap.from(".project-card", {
          scrollTrigger: {
            trigger: ".projects-grid",
            start: "top 80%",
          },
          y: 50,
          opacity: 0,
          duration: 1,
          stagger: 0.2,
        });

        // Shrink Header on Scroll
        window.addEventListener("scroll", () => {
          const header = document.getElementById("header");
          if (window.scrollY > 50) {
            header.classList.add("shrink");
          } else {
            header.classList.remove("shrink");
          }
        });

        // Theme Toggle Functionality
        const themeToggle = document.querySelector(".theme-toggle");
        const body = document.body;

        themeToggle.addEventListener("click", () => {
          body.classList.toggle("night-mode");
          body.classList.toggle("day-mode");
          const theme = body.classList.contains("night-mode") ? "night" : "day";
          localStorage.setItem("theme", theme);
        });

        // Initialize theme based on saved preference
        if (localStorage.getItem("theme") === "night") {
          body.classList.add("night-mode");
          body.classList.remove("day-mode");
        } else {
          body.classList.add("day-mode");
          body.classList.remove("night-mode");
        }

        // Project Sorter Functionality
        const sorterButtons = document.querySelectorAll(
          ".project-sorter button"
        );
        const projectCards = document.querySelectorAll(".project-card");

        sorterButtons.forEach((button) => {
          button.addEventListener("click", () => {
            const filter = button.getAttribute("data-filter");
            projectCards.forEach((card) => {
              if (
                filter === "all" ||
                card.getAttribute("data-category") === filter
              ) {
                card.style.display = "block";
                gsap.fromTo(
                  card,
                  { opacity: 0 },
                  { opacity: 1, duration: 0.5 }
                );
              } else {
                gsap.to(card, {
                  opacity: 0,
                  duration: 0.5,
                  onComplete: () => {
                    card.style.display = "none";
                  },
                });
              }
            });
          });
        });

        // Project Info Pop-up Modal
        const infoButtons = document.querySelectorAll(".info-btn");
        const modal = document.getElementById("project-modal");
        const modalContent = document.getElementById("modal-details");
        const closeBtn = document.querySelector(".close-btn");

        infoButtons.forEach((btn) => {
          btn.addEventListener("click", () => {
            // Load project details dynamically (placeholder content for now)
            modalContent.innerHTML = `
                        <h2>Project Title</h2>
                        <p>Detailed project description goes here.</p>
                        <a href="#" target="_blank">View Demo</a>
                    `;
            modal.style.display = "block";
            gsap.fromTo(
              ".modal-content",
              { scale: 0.8, opacity: 0 },
              { scale: 1, opacity: 1, duration: 0.5 }
            );
          });
        });

        closeBtn.addEventListener("click", () => {
          gsap.to(".modal-content", {
            scale: 0.8,
            opacity: 0,
            duration: 0.5,
            onComplete: () => {
              modal.style.display = "none";
            },
          });
        });

        // Close modal when clicking outside content
        window.addEventListener("click", (event) => {
          if (event.target == modal) {
            gsap.to(".modal-content", {
              scale: 0.8,
              opacity: 0,
              duration: 0.5,
              onComplete: () => {
                modal.style.display = "none";
              },
            });
          }
        });

        // Contact Form Validation
        const contactForm = document.getElementById("contact-form");
        const formFields = contactForm.querySelectorAll(
          ".form-field input, .form-field textarea"
        );

        formFields.forEach((field) => {
          field.addEventListener("input", () => {
            const validityIcon = field.parentElement.querySelector(".validity");
            if (field.checkValidity()) {
              validityIcon.textContent = "✔";
              validityIcon.classList.add("valid");
              validityIcon.classList.remove("invalid");
              field.style.borderColor = "green";
            } else {
              validityIcon.textContent = "✖";
              validityIcon.classList.add("invalid");
              validityIcon.classList.remove("valid");
              field.style.borderColor = "red";
            }
          });
        });

        contactForm.addEventListener("submit", (e) => {
          e.preventDefault();
          // Form submission logic here
          alert("Form submitted successfully!");
          contactForm.reset();
          formFields.forEach((field) => {
            const validityIcon = field.parentElement.querySelector(".validity");
            validityIcon.textContent = "";
            validityIcon.classList.remove("valid", "invalid");
            field.style.borderColor = "";
          });
        });

        // Moving Background Effect (Parallax)
        window.addEventListener("scroll", () => {
          const parallaxBg = document.querySelector(".parallax-bg");
          parallaxBg.style.transform = `translateY(${window.scrollY * 0.5}px)`;
        });
      });
    </script>
  </body>
</html>
